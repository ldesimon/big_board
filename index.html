<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTAF AI Big Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Variables: Asana-dark + Sky Blue accent ────────────────────────────── */
    :root {
      /* Surfaces — warm dark grey, not blue-black */
      --bg:  #1B1C1E;
      --s1:  #242526;
      --s2:  #2C2D30;
      --s3:  #363739;

      /* Near-white borders for clean separation */
      --b1:  rgba(255,255,255,0.08);
      --b2:  rgba(255,255,255,0.14);
      --b3:  rgba(255,255,255,0.22);

      /* Text */
      --t1: #FFFFFF;
      --t2: #ABABAB;
      --t3: #636363;

      /* Sky Blue accent — primary interactive color */
      --sky:     #57C0E9;
      --sky-dim: rgba(87, 192, 233, 0.12);

      /* Stage colors (identification only) */
      --amber: #F59E0B;
      --blue:  #60A5FA;
      --green: #34D399;

      /* Fonts */
      --ff-head: 'Barlow Condensed', sans-serif;
      --ff-body: 'DM Sans', sans-serif;
      --ff-mono: 'JetBrains Mono', monospace;

      --r:    8px;
      --r-sm: 5px;
      --r-lg: 12px;
    }

    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: var(--ff-body);
      min-height: 100vh;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--ff-body); cursor: pointer; }

    /* ─── Header ─────────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(27, 28, 30, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--b2);
    }
    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 0.85rem; }
    .brand-mark {
      width: 30px; height: 30px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--sky) 0%, #3A8FB5 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-head);
      font-size: 13px; font-weight: 700;
      color: #fff;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .brand-title {
      font-family: var(--ff-head);
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--t1); line-height: 1;
    }
    .brand-sub {
      font-family: var(--ff-mono);
      font-size: 0.6rem; color: var(--t3);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 2px;
    }
    .sync-badge {
      font-family: var(--ff-mono);
      font-size: 0.65rem; color: var(--t3);
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 20px;
      padding: 0.28rem 0.75rem;
    }

    /* ─── Page Wrap ──────────────────────────────────────────────────────────── */
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.75rem 2rem 4rem;
    }

    /* ─── Stats Bar ──────────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      background: var(--s1);
      border: 1px solid var(--b2);
      border-radius: var(--r-lg);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .stat-item {
      flex: 1;
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 1.4rem;
      border-right: 1px solid var(--b1);
      cursor: pointer;
      transition: background 0.15s;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item:hover { background: var(--s2); }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stat-num {
      font-family: var(--ff-head);
      font-size: 1.85rem; font-weight: 700; line-height: 1;
    }
    .stat-label {
      font-size: 0.68rem; font-weight: 500;
      color: var(--t3); text-transform: uppercase;
      letter-spacing: 0.07em; line-height: 1.3;
    }

    /* ─── Filters ────────────────────────────────────────────────────────────── */
    .filters {
      background: var(--s1);
      border: 1px solid var(--b2);
      border-radius: var(--r-lg);
      padding: 0.85rem 1.1rem;
      margin-bottom: 2rem;
      display: flex; flex-direction: column; gap: 0.55rem;
    }
    .filter-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .filter-lbl {
      font-family: var(--ff-mono);
      font-size: 0.58rem; font-weight: 500;
      color: var(--t3); text-transform: uppercase;
      letter-spacing: 0.1em; min-width: 48px; flex-shrink: 0;
    }

    /* Stage tabs */
    .stage-tab {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.28rem 0.8rem;
      border-radius: 20px;
      border: 1px solid var(--b2);
      background: transparent;
      color: var(--t2); font-size: 0.75rem; font-weight: 500;
      transition: all 0.15s;
    }
    .stage-tab:hover { border-color: var(--b3); color: var(--t1); }
    .stage-tab.active { color: var(--t1); font-weight: 600; }
    .stage-tab.active[data-s="all"]                { background: var(--sky-dim);            border-color: var(--sky);   color: var(--sky);   }
    .stage-tab.active[data-s="Initial Brainstorm"] { background: rgba(245,158,11,0.12);      border-color: var(--amber); color: var(--amber); }
    .stage-tab.active[data-s="Prototype Build"]    { background: rgba(96,165,250,0.12);      border-color: var(--blue);  color: var(--blue);  }
    .stage-tab.active[data-s="In Production"]      { background: rgba(52,211,153,0.12);      border-color: var(--green); color: var(--green); }
    .tab-n {
      font-size: 0.62rem; font-weight: 700;
      background: rgba(255,255,255,0.08);
      border-radius: 10px; padding: 0 0.35rem; line-height: 1.7;
    }

    /* Creator chips */
    .creator-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.25rem 0.65rem 0.25rem 0.35rem;
      border-radius: 20px;
      border: 1px solid var(--b2);
      background: transparent;
      color: var(--t2); font-size: 0.73rem; font-weight: 500;
      transition: all 0.15s;
    }
    .creator-chip:hover { border-color: var(--b3); color: var(--t1); }
    .creator-chip.active {
      background: var(--sky-dim);
      border-color: var(--sky);
      color: var(--t1);
    }
    .chip-dot {
      width: 15px; height: 15px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.52rem; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }

    /* Search */
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap svg {
      position: absolute; left: 0.6rem; top: 50%;
      transform: translateY(-50%); pointer-events: none; opacity: 0.35;
    }
    .search-input {
      width: 100%;
      background: var(--s2); border: 1px solid var(--b2);
      border-radius: var(--r-sm);
      padding: 0.42rem 0.75rem 0.42rem 2rem;
      color: var(--t1); font-size: 0.8rem; font-family: var(--ff-body);
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--sky); }
    .search-input::placeholder { color: var(--t3); }

    /* ─── Stage Groups ───────────────────────────────────────────────────────── */
    .stage-group { margin-bottom: 2.5rem; }

    .group-header {
      display: flex; align-items: center; gap: 0.65rem;
      margin-bottom: 0.5rem;
      padding-bottom: 0.6rem;
    }
    .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .group-label {
      font-family: var(--ff-mono);
      font-size: 0.62rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .group-count {
      font-family: var(--ff-mono);
      font-size: 0.65rem; color: var(--t3);
      background: var(--s3); border-radius: 10px;
      padding: 0.1rem 0.5rem; flex-shrink: 0;
    }
    .group-line { flex: 1; height: 1px; background: var(--b2); }

    /* ─── Row Cards ──────────────────────────────────────────────────────────── */
    .rows { display: flex; flex-direction: column; }

    .row-card {
      display: flex;
      background: var(--s1);
      border: 1px solid var(--b2);
      border-top: none;
      cursor: pointer;
      transition: background 0.15s;
      overflow: hidden;
      position: relative;
    }
    .row-card:first-child { border-top: 1px solid var(--b2); border-radius: var(--r) var(--r) 0 0; }
    .row-card:last-child  { border-radius: 0 0 var(--r) var(--r); }
    .row-card:only-child  { border-radius: var(--r); border-top: 1px solid var(--b2); }
    .row-card:hover { background: var(--s2); }

    /* Hover indicator */
    .row-card::after {
      content: '›';
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      color: var(--t3);
      font-size: 1.2rem;
      opacity: 0;
      transition: opacity 0.15s, right 0.15s;
    }
    .row-card:hover::after { opacity: 1; right: 0.85rem; }

    /* Left accent bar */
    .row-accent { width: 4px; flex-shrink: 0; }

    /* Row body layout */
    .row-body {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      padding: 0.9rem 2.5rem 0.9rem 1.25rem; /* extra right for the chevron */
    }

    /* Left: name + launch + purpose */
    .row-left {
      flex: 1;
      display: flex; flex-direction: column; gap: 0.25rem;
      min-width: 0; /* prevent overflow */
    }
    .row-title {
      font-size: 1.25rem;  /* ~2x original 0.9rem, readable at row density */
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-launch {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.78rem; font-weight: 600;
      color: var(--sky);
      width: fit-content;
      transition: color 0.15s;
    }
    .row-launch:hover { color: #82D3F2; }
    .row-launch svg { flex-shrink: 0; }

    .row-purpose {
      font-size: 0.78rem; color: var(--t2); line-height: 1.5;
      margin-top: 0.1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .row-no-notes { font-size: 0.72rem; color: var(--t3); font-style: italic; margin-top: 0.1rem; }

    /* Right: creator + audit chips */
    .row-right {
      display: flex; flex-direction: column;
      align-items: flex-end;
      gap: 0.45rem;
      flex-shrink: 0;
      min-width: 150px;
      padding-top: 0.15rem;
    }
    .row-creator {
      display: flex; align-items: center; gap: 0.35rem;
    }
    .row-creator-name { font-size: 0.75rem; color: var(--t2); }

    .avatar {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 800;
      color: #1B1C1E;
      flex-shrink: 0;
    }

    /* Audit chips */
    .audit-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; justify-content: flex-end; }
    .audit-chip {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.03em; text-transform: uppercase;
      border-radius: 4px; padding: 0.15rem 0.4rem;
      border: 1px solid;
    }
    .audit-chip.prod  { color: var(--green); border-color: rgba(52,211,153,0.3);  background: rgba(52,211,153,0.08);  }
    .audit-chip.need  { color: var(--amber); border-color: rgba(245,158,11,0.3);  background: rgba(245,158,11,0.08);  }
    .audit-chip.other { color: var(--t3);    border-color: var(--b2);             background: transparent; }

    /* ─── Empty / Loading ────────────────────────────────────────────────────── */
    .state-center {
      text-align: center; padding: 5rem 2rem; color: var(--t3);
    }
    .state-center h3 { font-size: 1rem; font-weight: 600; color: var(--t2); margin-bottom: 0.4rem; }
    .state-center p  { font-size: 0.82rem; }

    /* ─── Drawer Overlay (50% width) ─────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 900;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 50vw; min-width: 480px; max-width: 860px;
      background: var(--s1);
      border-left: 1px solid var(--b3);
      z-index: 901;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
    }
    .overlay.open .drawer { transform: translateX(0); }

    .drawer-accent { height: 4px; flex-shrink: 0; }

    /* Drawer header */
    .drawer-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--b2);
      background: var(--s1);
      flex-shrink: 0;
    }
    .drawer-header-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .drawer-title {
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: -0.025em; line-height: 1.2;
      color: var(--t1);
    }
    .close-btn {
      background: none; border: none;
      color: var(--t3); font-size: 1rem;
      padding: 0.15rem; flex-shrink: 0; margin-top: 4px;
      transition: color 0.15s;
    }
    .close-btn:hover { color: var(--t1); }

    /* Launch button row — directly under title */
    .drawer-launch-row { margin-bottom: 0.65rem; }
    .drawer-launch {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1.1rem;
      background: var(--sky); color: #fff;
      border-radius: var(--r-sm);
      font-size: 0.82rem; font-weight: 700;
      text-decoration: none;
      transition: background 0.15s;
    }
    .drawer-launch:hover { background: #45AACD; }

    /* Creator + stage meta row */
    .drawer-meta {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    }
    .drawer-creator { display: flex; align-items: center; gap: 0.35rem; font-size: 0.78rem; color: var(--t2); }

    .stage-pill {
      display: inline-flex; align-items: center; gap: 0.28rem;
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      border-radius: 4px; padding: 0.15rem 0.45rem;
    }
    .stage-dot-sm { width: 5px; height: 5px; border-radius: 50%; }

    /* Screenshot preview in drawer */
    .drawer-preview {
      height: 200px; flex-shrink: 0;
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--b2);
    }
    .drawer-preview img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
    }
    .preview-placeholder-bg {
      position: absolute; inset: 0;
    }
    .preview-placeholder-dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.06;
    }
    .preview-placeholder-mono {
      position: relative;
      font-family: var(--ff-head);
      font-size: 6rem; font-weight: 700;
      line-height: 1; opacity: 0.15;
      letter-spacing: -0.02em;
      user-select: none;
    }

    /* Drawer body */
    .drawer-body {
      flex: 1; overflow-y: auto;
      padding: 1.4rem 1.5rem;
      display: flex; flex-direction: column; gap: 1.4rem;
      scrollbar-width: thin;
      scrollbar-color: var(--b3) transparent;
    }
    .dsec h4 {
      font-family: var(--ff-mono);
      font-size: 0.58rem; font-weight: 500;
      color: var(--t3); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 0.5rem;
    }
    .dsec p { font-size: 0.875rem; color: var(--t2); line-height: 1.65; }
    .dl { display: flex; flex-direction: column; gap: 0.35rem; }
    .dl-row { display: flex; gap: 0.5rem; font-size: 0.85rem; line-height: 1.5; }
    .dl-key { color: var(--t3); min-width: 72px; flex-shrink: 0; font-size: 0.75rem; padding-top: 1px; }
    .dl-val { color: var(--t2); }
    .steps-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .steps-list li { display: flex; gap: 0.5rem; font-size: 0.85rem; color: var(--t2); line-height: 1.5; }
    .steps-list li::before { content: '→'; color: var(--t3); flex-shrink: 0; }
    .audit-rows { display: flex; flex-direction: column; gap: 0.4rem; }
    .audit-row { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.85rem; color: var(--t2); }
    .audit-row-icon { flex-shrink: 0; margin-top: 1px; font-size: 0.75rem; }
    .no-notes { font-size: 0.85rem; color: var(--t3); font-style: italic; line-height: 1.6; }

    /* Drawer actions */
    .drawer-actions {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--b2);
      display: flex; gap: 0.6rem; flex-shrink: 0;
    }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.5rem 1.1rem;
      background: var(--s3); color: var(--t2);
      border: 1px solid var(--b2); border-radius: var(--r-sm);
      font-size: 0.8rem; font-weight: 600; font-family: var(--ff-body);
      cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--b3); color: var(--t1); }

    /* ─── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .drawer { width: 80vw; min-width: 0; }
      .row-body { gap: 0.75rem; }
      .row-right { min-width: 120px; }
      .row-title { font-size: 1.05rem; }
    }
    @media (max-width: 640px) {
      .wrap { padding: 1rem 1rem 3rem; }
      .header-inner { padding: 0 1rem; }
      .drawer { width: 100vw; min-width: 0; border-left: none; }
      .row-body { flex-direction: column; gap: 0.5rem; }
      .row-right { align-items: flex-start; flex-direction: row; flex-wrap: wrap; min-width: unset; }
      .stat-item { padding: 0.65rem 0.85rem; }
      .brand-sub { display: none; }
    }
  </style>
</head>

<body>

<!-- ── Header ────────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="brand-mark">AI</div>
      <div>
        <div class="brand-title">KTAF AI Big Board</div>
        <div class="brand-sub">Data &nbsp;·&nbsp; Technology &nbsp;·&nbsp; Innovation</div>
      </div>
    </div>
    <span class="sync-badge" id="syncBadge">loading…</span>
  </div>
</header>

<!-- ── Main ──────────────────────────────────────────────────────────────────── -->
<div class="wrap">

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-row">
      <span class="filter-lbl">Stage</span>
      <div id="stageTabs" style="display:flex;gap:0.4rem;flex-wrap:wrap;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">Creator</span>
      <div id="creatorChips" style="display:flex;gap:0.3rem;flex-wrap:wrap;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">Search</span>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Filter by name or purpose…" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- Grouped row list -->
  <div id="board"></div>

</div>

<!-- ── Drawer ─────────────────────────────────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="drawer" id="drawer" role="dialog" aria-modal="true">
    <div class="drawer-accent" id="drawerAccent"></div>

    <div class="drawer-header">
      <div class="drawer-header-row">
        <h2 class="drawer-title" id="drawerTitle"></h2>
        <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>
      </div>
      <!-- Launch button directly under title -->
      <div class="drawer-launch-row" id="drawerLaunchRow"></div>
      <!-- Creator + stage -->
      <div class="drawer-meta" id="drawerMeta"></div>
    </div>

    <!-- Screenshot / preview -->
    <div class="drawer-preview" id="drawerPreview"></div>

    <div class="drawer-body" id="drawerBody"></div>

    <div class="drawer-actions" id="drawerActions"></div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────

const CREATOR_COLORS = {
  'Laszlo':  '#818CF8',
  'Cristina':'#F472B6',
  'Kevin':   '#FB923C',
  'Charlie': '#34D399',
  'Ryan':    '#60A5FA',
  'Jabari':  '#FBBF24',
  'Sophie':  '#E879F9',
};

const STAGE = {
  'Initial Brainstorm': { color: '#F59E0B', label: 'Brainstorm',    emoji: '💡', order: 3 },
  'Prototype Build':    { color: '#60A5FA', label: 'Prototype',     emoji: '🔧', order: 2 },
  'In Production':      { color: '#34D399', label: 'In Production', emoji: '✅', order: 1 },
};

// Render order: Production first, then Prototype, then Brainstorm
const STAGE_ORDER = ['In Production', 'Prototype Build', 'Initial Brainstorm'];

// ─── State ────────────────────────────────────────────────────────────────────

let allItems      = [];
let activeStage   = 'all';
let activeCreators = new Set();
let searchQuery   = '';

// ─── Data Loading ─────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allItems = data.items || [];

    document.getElementById('syncBadge').textContent = `synced ${data.lastUpdated}`;

    buildFilters();
    applyFilters();
  } catch (err) {
    document.getElementById('board').innerHTML = `
      <div class="state-center">
        <h3>Board data unavailable</h3>
        <p>Serve this folder via a local server (e.g. <code>python3 -m http.server</code>) and make sure <code>data.json</code> exists.</p>
      </div>`;
    document.getElementById('syncBadge').textContent = 'error';
  }
}

// ─── Build Filters ────────────────────────────────────────────────────────────

function buildFilters() {
  const stageCounts = { all: allItems.length };
  Object.keys(STAGE).forEach(s => { stageCounts[s] = allItems.filter(i => i.stage === s).length; });

  // Stage tabs
  const tabsEl = document.getElementById('stageTabs');
  const stageOptions = [
    { key: 'all', label: 'All', emoji: '◉' },
    ...Object.entries(STAGE).map(([k, v]) => ({ key: k, label: v.label, emoji: v.emoji }))
  ];
  tabsEl.innerHTML = stageOptions.map(s => `
    <button class="stage-tab ${s.key === 'all' ? 'active' : ''}" data-s="${esc(s.key)}"
            onclick="setStage(this.dataset.s)">
      ${s.emoji} ${s.label} <span class="tab-n">${stageCounts[s.key] ?? 0}</span>
    </button>`).join('');

  // Creator chips
  const creators = [...new Set(allItems.map(i => i.creator).filter(Boolean))].sort();
  const chipsEl = document.getElementById('creatorChips');
  chipsEl.innerHTML = creators.map(c => {
    const color = CREATOR_COLORS[c] || '#8B949E';
    return `<button class="creator-chip" data-c="${esc(c)}" style="--cc:${color}"
                    onclick="toggleCreator(this.dataset.c)">
              <span class="chip-dot" style="background:${color}">${c[0]}</span>${c}
            </button>`;
  }).join('');

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    applyFilters();
  });
}

// ─── Filter Controls ──────────────────────────────────────────────────────────

function setStage(stage) {
  activeStage = stage;
  document.querySelectorAll('.stage-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.s === stage);
  });
  applyFilters();
}

function toggleCreator(creator) {
  activeCreators.has(creator) ? activeCreators.delete(creator) : activeCreators.add(creator);
  document.querySelectorAll('.creator-chip').forEach(c => {
    c.classList.toggle('active', activeCreators.has(c.dataset.c));
  });
  applyFilters();
}

function applyFilters() {
  let filtered = allItems;
  if (activeStage !== 'all')   filtered = filtered.filter(i => i.stage === activeStage);
  if (activeCreators.size > 0) filtered = filtered.filter(i => activeCreators.has(i.creator));
  if (searchQuery)             filtered = filtered.filter(i => {
    const hay = [i.name, i.notes?.purpose].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(searchQuery);
  });

  renderStats(filtered);
  renderBoard(filtered);
}

// ─── Stats Bar ────────────────────────────────────────────────────────────────

function renderStats(items) {
  const counts = {};
  Object.keys(STAGE).forEach(s => { counts[s] = items.filter(i => i.stage === s).length; });

  const stageSections = Object.entries(STAGE).map(([s, cfg]) => `
    <div class="stat-item" data-s="${s}" onclick="setStage(this.dataset.s)" title="Filter: ${cfg.label}">
      <span class="stat-dot" style="background:${cfg.color}"></span>
      <div>
        <div class="stat-num" style="color:${cfg.color}">${counts[s] ?? 0}</div>
        <div class="stat-label">${cfg.label}</div>
      </div>
    </div>`).join('');

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item" data-s="all" onclick="setStage(this.dataset.s)" title="Show all">
      <span class="stat-dot" style="background:var(--sky)"></span>
      <div>
        <div class="stat-num" style="color:var(--t1)">${items.length}</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    ${stageSections}`;
}

// ─── Render Board (grouped rows) ──────────────────────────────────────────────

function renderBoard(items) {
  const board = document.getElementById('board');

  if (!items.length) {
    board.innerHTML = `<div class="state-center"><h3>No matches</h3><p>Try clearing a filter or broadening your search.</p></div>`;
    return;
  }

  let html = '';
  for (const stageName of STAGE_ORDER) {
    const stageItems = items.filter(i => i.stage === stageName);
    if (!stageItems.length) continue;

    const cfg = STAGE[stageName];
    html += `
      <div class="stage-group">
        <div class="group-header">
          <span class="group-dot" style="background:${cfg.color}"></span>
          <span class="group-label" style="color:${cfg.color}">${stageName}</span>
          <span class="group-count">${stageItems.length}</span>
          <div class="group-line"></div>
        </div>
        <div class="rows">
          ${stageItems.map(buildRow).join('')}
        </div>
      </div>`;
  }

  board.innerHTML = html;

  board.querySelectorAll('.row-card').forEach(el => {
    el.addEventListener('click', () => {
      const item = allItems.find(i => i.id === el.dataset.id);
      if (item) openDrawer(item);
    });
  });
}

// ─── Build Row Card ───────────────────────────────────────────────────────────

function buildRow(item) {
  const s       = STAGE[item.stage] || {};
  const sc      = s.color || '#8B949E';
  const cc      = CREATOR_COLORS[item.creator] || '#8B949E';
  const init    = (item.creator || '?')[0].toUpperCase();
  const hasLink = item.shareLink?.startsWith('http');
  const purpose = item.notes?.purpose;
  const audit   = item.notes?.productionAudit || [];

  const auditHtml = audit.slice(0, 2).map(a => {
    const cls = /prod/i.test(a) ? 'prod' : /need/i.test(a) ? 'need' : 'other';
    return `<span class="audit-chip ${cls}">${esc(shortenAudit(a))}</span>`;
  }).join('');

  return `
    <div class="row-card" data-id="${esc(item.id)}">
      <div class="row-accent" style="background:${sc}"></div>
      <div class="row-body">
        <div class="row-left">
          <div class="row-title">${esc(item.name)}</div>
          ${hasLink
            ? `<a class="row-launch" href="${esc(item.shareLink)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                 <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                 Launch
               </a>`
            : ''}
          ${purpose
            ? `<p class="row-purpose">${esc(purpose)}</p>`
            : `<p class="row-no-notes">No details added yet.</p>`}
        </div>
        <div class="row-right">
          <div class="row-creator">
            <div class="avatar" style="background:${cc};width:22px;height:22px;" title="${esc(item.creator || '')}">${init}</div>
            <span class="row-creator-name">${esc(item.creator || 'Unknown')}</span>
          </div>
          ${auditHtml ? `<div class="audit-chips">${auditHtml}</div>` : ''}
        </div>
      </div>
    </div>`;
}

// ─── Drawer ───────────────────────────────────────────────────────────────────

function openDrawer(item) {
  const s       = STAGE[item.stage] || {};
  const sc      = s.color || '#8B949E';
  const cc      = CREATOR_COLORS[item.creator] || '#8B949E';
  const init    = (item.creator || '?')[0].toUpperCase();
  const hasLink = item.shareLink?.startsWith('http');
  const n       = item.notes || {};
  const hasAny  = n.purpose || n.audience || n.timeline || n.nextSteps?.length || n.productionAudit?.length;

  // Accent bar
  document.getElementById('drawerAccent').style.background = sc;

  // Title
  document.getElementById('drawerTitle').textContent = item.name;

  // Launch button directly under title
  document.getElementById('drawerLaunchRow').innerHTML = hasLink
    ? `<a class="drawer-launch" href="${esc(item.shareLink)}" target="_blank" rel="noopener">
         <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
         Launch Tool
       </a>`
    : '';

  // Meta: creator + stage
  document.getElementById('drawerMeta').innerHTML = `
    <div class="drawer-creator">
      <div class="avatar" style="background:${cc};width:22px;height:22px;font-size:0.55rem">${init}</div>
      <span>${esc(item.creator || 'Unknown')}</span>
    </div>
    <span class="stage-pill" style="color:${sc};background:${sc}18;">
      <span class="stage-dot-sm" style="background:${sc}"></span>${s.label || item.stage}
    </span>`;

  // Screenshot / preview
  const mono = (item.name || '?')[0].toUpperCase();
  document.getElementById('drawerPreview').innerHTML = (item.screenshot && (item.screenshot.startsWith('http') || item.screenshot.startsWith('screenshots/')))
    ? `<img src="${esc(item.screenshot)}" alt="Preview of ${esc(item.name)}" loading="lazy">`
    : `<div class="preview-placeholder-bg" style="background:linear-gradient(145deg,${sc}08,${sc}20)"></div>
       <div class="preview-placeholder-dots" style="color:${sc}"></div>
       <div class="preview-placeholder-mono" style="color:${sc}">${mono}</div>`;

  // Body sections
  const sections = [];
  if (n.purpose) {
    sections.push(`<div class="dsec"><h4>Purpose</h4><p>${esc(n.purpose)}</p></div>`);
  }
  if (n.audience || n.timeline) {
    sections.push(`
      <div class="dsec">
        <h4>For Who &amp; When</h4>
        <div class="dl">
          ${n.audience ? `<div class="dl-row"><span class="dl-key">Audience</span><span class="dl-val">${esc(n.audience)}</span></div>` : ''}
          ${n.timeline ? `<div class="dl-row"><span class="dl-key">Timeline</span><span class="dl-val">${esc(n.timeline)}</span></div>` : ''}
        </div>
      </div>`);
  }
  if (n.nextSteps?.length) {
    sections.push(`
      <div class="dsec">
        <h4>Next Steps &amp; Features</h4>
        <ul class="steps-list">${n.nextSteps.map(s => `<li>${esc(s)}</li>`).join('')}</ul>
      </div>`);
  }
  if (n.productionAudit?.length) {
    sections.push(`
      <div class="dsec">
        <h4>Production Readiness</h4>
        <div class="audit-rows">
          ${n.productionAudit.map(a => {
            const icon = /prod/i.test(a) ? '✅' : /need/i.test(a) ? '🔲' : '◦';
            return `<div class="audit-row"><span class="audit-row-icon">${icon}</span><span>${esc(a)}</span></div>`;
          }).join('')}
        </div>
      </div>`);
  }
  if (!hasAny) {
    sections.push(`<p class="no-notes">No details added yet. The creator can fill this in via the Asana task.</p>`);
  }

  document.getElementById('drawerBody').innerHTML = sections.join('');

  // Actions (just Close in footer since Launch is in header)
  document.getElementById('drawerActions').innerHTML =
    `<button class="btn-secondary" onclick="closeDrawer()">Close</button>`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeDrawer();
});
document.getElementById('closeBtn').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ─── Utils ────────────────────────────────────────────────────────────────────

function shortenAudit(text) {
  const t = text.toLowerCase();
  if (t.includes('already in prod')) return 'In Production ✓';
  if (t.includes('need auth'))       return 'Needs Auth';
  if (t.includes('need hosting'))    return 'Needs Hosting';
  if (t.includes('additional spec')) return 'Needs Specs';
  if (t.includes('not yet built'))   return 'Not Yet Built';
  return text.length > 28 ? text.slice(0, 27) + '…' : text;
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
