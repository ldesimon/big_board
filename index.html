<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTAF AI Big Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset + Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Surface stack */
      --bg:        #08090C;
      --s1:        #0F1218;
      --s2:        #151B25;
      --s3:        #1C2333;
      --s4:        #222C3C;

      /* Borders */
      --b1: #1A2235;
      --b2: #243048;

      /* Text */
      --t1: #E2EAF6;
      --t2: #8094AC;
      --t3: #4A5C72;

      /* Stage */
      --amber:  #F59E0B;
      --blue:   #60A5FA;
      --green:  #34D399;

      /* Fonts */
      --ff-head: 'Barlow Condensed', sans-serif;
      --ff-body: 'DM Sans', sans-serif;
      --ff-mono: 'JetBrains Mono', monospace;

      /* Sizing */
      --r:    8px;
      --r-sm: 5px;
      --r-lg: 12px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: var(--ff-body);
      min-height: 100vh;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: var(--ff-body); cursor: pointer; }

    /* ─── Header ────────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(8, 9, 12, 0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--b1);
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--amber) 0%, var(--blue) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-head);
      font-size: 14px;
      font-weight: 700;
      color: #08090C;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .brand-title {
      font-family: var(--ff-head);
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--t1);
      line-height: 1;
    }

    .brand-sub {
      font-family: var(--ff-mono);
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--t3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .sync-badge {
      font-family: var(--ff-mono);
      font-size: 0.68rem;
      color: var(--t3);
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      white-space: nowrap;
    }

    /* ─── Page Wrap ─────────────────────────────────────────────────────────── */
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* ─── Stats Bar ─────────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 1.75rem;
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: var(--r-lg);
      overflow: hidden;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
      border-right: 1px solid var(--b1);
      flex: 1;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item:hover { background: var(--s2); }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-num {
      font-family: var(--ff-head);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      line-height: 1.3;
    }

    /* ─── Filters ───────────────────────────────────────────────────────────── */
    .filters {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: var(--r-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-lbl {
      font-family: var(--ff-mono);
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      min-width: 50px;
      flex-shrink: 0;
    }

    /* Stage tabs */
    .stage-tab {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
      border: 1px solid var(--b1);
      background: transparent;
      color: var(--t2);
      font-size: 0.78rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .stage-tab:hover { border-color: var(--b2); color: var(--t1); }
    .stage-tab.active { color: var(--t1); font-weight: 600; }
    .stage-tab.active[data-s="all"]               { background: var(--s3); border-color: var(--b2); }
    .stage-tab.active[data-s="Initial Brainstorm"] { background: rgba(245,158,11,0.12); border-color: var(--amber); color: var(--amber); }
    .stage-tab.active[data-s="Prototype Build"]    { background: rgba(96,165,250,0.12); border-color: var(--blue);  color: var(--blue);  }
    .stage-tab.active[data-s="In Production"]      { background: rgba(52,211,153,0.12); border-color: var(--green); color: var(--green); }

    .tab-n {
      font-size: 0.65rem;
      font-weight: 700;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0 0.35rem;
      line-height: 1.6;
    }

    /* Creator chips */
    .creator-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.7rem 0.28rem 0.35rem;
      border-radius: 20px;
      border: 1px solid var(--b1);
      background: transparent;
      color: var(--t2);
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .creator-chip:hover { border-color: var(--b2); color: var(--t1); }
    .creator-chip.active {
      border-color: var(--cc, #8B949E);
      background: color-mix(in srgb, var(--cc, #8B949E) 12%, transparent);
      color: var(--t1);
    }

    .chip-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: 800;
      color: #08090C;
      flex-shrink: 0;
    }

    /* Search */
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.4;
    }
    .search-input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: var(--r-sm);
      padding: 0.45rem 0.75rem 0.45rem 2.1rem;
      color: var(--t1);
      font-size: 0.82rem;
      font-family: var(--ff-body);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--b2); }
    .search-input::placeholder { color: var(--t3); }

    /* ─── Grid ──────────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.1rem;
    }

    /* ─── Card ──────────────────────────────────────────────────────────────── */
    .card {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: var(--r-lg);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: border-color 0.18s, background 0.18s, transform 0.18s;
      position: relative;
    }
    .card:hover {
      border-color: var(--b2);
      background: var(--s2);
      transform: translateY(-2px);
    }

    /* Stage accent line */
    .card-accent {
      height: 3px;
      flex-shrink: 0;
    }

    /* Preview area */
    .card-preview {
      height: 110px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .preview-bg {
      position: absolute;
      inset: 0;
    }

    /* Dot-grid pattern */
    .preview-pattern {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
      background-size: 20px 20px;
      opacity: 0.07;
    }

    .preview-mono {
      position: relative;
      font-family: var(--ff-head);
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1;
      opacity: 0.18;
      letter-spacing: -0.02em;
      user-select: none;
    }

    .live-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(52,211,153,0.15);
      border: 1px solid rgba(52,211,153,0.35);
      border-radius: 10px;
      padding: 2px 7px;
      font-family: var(--ff-mono);
      font-size: 0.6rem;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Card body */
    .card-body {
      padding: 1rem 1.1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex: 1;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.6rem;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--t1);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 800;
      color: #08090C;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .card-purpose {
      font-size: 0.78rem;
      color: var(--t2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-no-notes {
      font-size: 0.75rem;
      color: var(--t3);
      font-style: italic;
    }

    .meta-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.68rem;
      color: var(--t3);
      background: var(--s3);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      line-height: 1;
    }

    .audit-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .audit-chip {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 0.18rem 0.45rem;
      border: 1px solid;
    }
    .audit-chip.prod  { color: var(--green); border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.08); }
    .audit-chip.need  { color: var(--amber); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
    .audit-chip.other { color: var(--t3);    border-color: var(--b1);            background: transparent; }

    /* Card footer */
    .card-footer {
      margin-top: auto;
      padding-top: 0.65rem;
      border-top: 1px solid var(--b1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stage-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.28rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 0.18rem 0.5rem;
    }

    .stage-dot-sm {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .view-link {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--blue);
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      transition: color 0.15s;
    }
    .view-link:hover { color: #93C5FD; }

    /* ─── Empty + Loading ───────────────────────────────────────────────────── */
    .state-center {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--t3);
    }
    .state-center h3 { font-size: 1rem; font-weight: 600; color: var(--t2); margin-bottom: 0.4rem; }
    .state-center p  { font-size: 0.82rem; }

    /* ─── Modal Drawer ──────────────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 520px;
      max-width: 100vw;
      background: var(--s1);
      border-left: 1px solid var(--b1);
      z-index: 901;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .overlay.open .drawer { transform: translateX(0); }

    .drawer-accent { height: 4px; flex-shrink: 0; }

    .drawer-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--b1);
      position: sticky;
      top: 0;
      background: var(--s1);
      z-index: 10;
    }

    .drawer-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .drawer-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--t1);
      line-height: 1.3;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--t3);
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem;
      flex-shrink: 0;
      transition: color 0.15s;
      margin-top: 2px;
    }
    .close-btn:hover { color: var(--t1); }

    .drawer-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .drawer-creator {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: var(--t2);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--b2) transparent;
    }

    .dsec h4 {
      font-family: var(--ff-mono);
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .dsec p {
      font-size: 0.875rem;
      color: var(--t2);
      line-height: 1.65;
    }

    .dsec .dl { display: flex; flex-direction: column; gap: 0.35rem; }

    .dl-row {
      display: flex;
      gap: 0.5rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .dl-key {
      color: var(--t3);
      min-width: 72px;
      flex-shrink: 0;
      font-size: 0.75rem;
      padding-top: 1px;
    }
    .dl-val { color: var(--t2); }

    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .steps-list li {
      display: flex;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--t2);
      line-height: 1.5;
    }
    .steps-list li::before { content: '→'; color: var(--t3); flex-shrink: 0; }

    .audit-rows { display: flex; flex-direction: column; gap: 0.4rem; }

    .audit-row {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--t2);
    }
    .audit-row-icon { flex-shrink: 0; margin-top: 1px; font-size: 0.75rem; }

    .no-notes {
      font-size: 0.85rem;
      color: var(--t3);
      font-style: italic;
      line-height: 1.6;
    }

    /* Drawer actions */
    .drawer-actions {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--b1);
      display: flex;
      gap: 0.65rem;
      flex-shrink: 0;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.55rem 1.2rem;
      background: var(--blue);
      color: #08090C;
      border: none;
      border-radius: var(--r-sm);
      font-size: 0.82rem;
      font-weight: 700;
      font-family: var(--ff-body);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #93C5FD; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.55rem 1.2rem;
      background: var(--s3);
      color: var(--t2);
      border: 1px solid var(--b1);
      border-radius: var(--r-sm);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: var(--ff-body);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--b2); color: var(--t1); }

    /* ─── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .wrap { padding: 1rem 1rem 3rem; }
      .header-inner { padding: 0 1rem; }
      .grid { grid-template-columns: 1fr; }
      .drawer { width: 100vw; }
      .stat-item { padding: 0.75rem 1rem; }
      .stat-num { font-size: 1.5rem; }
      .brand-sub { display: none; }
    }
    @media (max-width: 480px) {
      .stats-bar { flex-direction: column; }
      .stat-item { border-right: none; border-bottom: 1px solid var(--b1); }
      .stat-item:last-child { border-bottom: none; }
    }
  </style>
</head>

<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="brand-mark">AI</div>
      <div>
        <div class="brand-title">KTAF AI Big Board</div>
        <div class="brand-sub">Data &nbsp;·&nbsp; Technology &nbsp;·&nbsp; Innovation</div>
      </div>
    </div>
    <span class="sync-badge" id="syncBadge">loading…</span>
  </div>
</header>

<!-- ── Page Content ────────────────────────────────────────────────────────── -->
<div class="wrap">

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-row">
      <span class="filter-lbl">Stage</span>
      <div id="stageTabs" style="display:flex;gap:0.4rem;flex-wrap:wrap;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">Creator</span>
      <div id="creatorChips" style="display:flex;gap:0.35rem;flex-wrap:wrap;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">Search</span>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Filter by name or purpose…" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- Card grid -->
  <div class="grid" id="grid">
    <div class="state-center"><p>Loading board…</p></div>
  </div>
</div>

<!-- ── Drawer Modal ─────────────────────────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="drawer" id="drawer" role="dialog" aria-modal="true">
    <div class="drawer-accent" id="drawerAccent"></div>
    <div class="drawer-header">
      <div class="drawer-header-row">
        <h2 class="drawer-title" id="drawerTitle"></h2>
        <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>
      </div>
      <div class="drawer-meta" id="drawerMeta"></div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-actions" id="drawerActions"></div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────

const CREATOR_COLORS = {
  'Laszlo':  '#818CF8',
  'Cristina':'#F472B6',
  'Kevin':   '#FB923C',
  'Charlie': '#34D399',
  'Ryan':    '#60A5FA',
  'Jabari':  '#FBBF24',
  'Sophie':  '#E879F9',
};

const STAGE = {
  'Initial Brainstorm': { color: '#F59E0B', label: 'Brainstorm',    emoji: '💡' },
  'Prototype Build':    { color: '#60A5FA', label: 'Prototype',     emoji: '🔧' },
  'In Production':      { color: '#34D399', label: 'In Production', emoji: '✅' },
};

// ─── State ───────────────────────────────────────────────────────────────────

let allItems      = [];
let activeStage   = 'all';
let activeCreators = new Set();
let searchQuery   = '';

// ─── Data Loading ─────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allItems = data.items || [];

    document.getElementById('syncBadge').textContent = `synced ${data.lastUpdated}`;

    buildFilters();
    applyFilters();
  } catch (err) {
    document.getElementById('grid').innerHTML = `
      <div class="state-center">
        <h3>Board data unavailable</h3>
        <p>Serve this folder via a local server (e.g. <code>python3 -m http.server</code>) and make sure <code>data.json</code> exists.</p>
      </div>`;
    document.getElementById('syncBadge').textContent = 'error';
  }
}

// ─── Build Filters ───────────────────────────────────────────────────────────

function buildFilters() {
  // Stage tabs
  const stageCounts = { all: allItems.length };
  Object.keys(STAGE).forEach(s => {
    stageCounts[s] = allItems.filter(i => i.stage === s).length;
  });

  const tabsEl = document.getElementById('stageTabs');
  const stageOptions = [
    { key: 'all', label: 'All', emoji: '◉' },
    ...Object.entries(STAGE).map(([k, v]) => ({ key: k, label: v.label, emoji: v.emoji }))
  ];
  tabsEl.innerHTML = stageOptions.map(s => `
    <button class="stage-tab ${s.key === 'all' ? 'active' : ''}" data-s="${esc(s.key)}"
            onclick="setStage(this.dataset.s)">
      ${s.emoji} ${s.label}
      <span class="tab-n">${stageCounts[s.key] ?? 0}</span>
    </button>
  `).join('');

  // Creator chips
  const creators = [...new Set(allItems.map(i => i.creator).filter(Boolean))].sort();
  const chipsEl = document.getElementById('creatorChips');
  chipsEl.innerHTML = creators.map(c => {
    const color = CREATOR_COLORS[c] || '#8B949E';
    return `
      <button class="creator-chip" data-c="${esc(c)}"
              style="--cc:${color}"
              onclick="toggleCreator(this.dataset.c)">
        <span class="chip-dot" style="background:${color}">${c[0]}</span>
        ${c}
      </button>`;
  }).join('');

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    applyFilters();
  });
}

// ─── Filter Controls ─────────────────────────────────────────────────────────

function setStage(stage) {
  activeStage = stage;
  document.querySelectorAll('.stage-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.s === stage);
  });
  applyFilters();
}

function toggleCreator(creator) {
  activeCreators.has(creator) ? activeCreators.delete(creator) : activeCreators.add(creator);
  document.querySelectorAll('.creator-chip').forEach(c => {
    c.classList.toggle('active', activeCreators.has(c.dataset.c));
  });
  applyFilters();
}

function applyFilters() {
  let filtered = allItems;

  if (activeStage !== 'all')         filtered = filtered.filter(i => i.stage === activeStage);
  if (activeCreators.size > 0)       filtered = filtered.filter(i => activeCreators.has(i.creator));
  if (searchQuery) {
    filtered = filtered.filter(i => {
      const hay = [i.name, i.notes?.purpose].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(searchQuery);
    });
  }

  renderStats(filtered);
  renderGrid(filtered);
}

// ─── Stats Bar ───────────────────────────────────────────────────────────────

function renderStats(items) {
  const counts = {};
  Object.keys(STAGE).forEach(s => { counts[s] = items.filter(i => i.stage === s).length; });

  const stages = Object.entries(STAGE).map(([s, cfg]) => `
    <div class="stat-item" data-s="${s}" onclick="setStage(this.dataset.s)" title="Filter: ${cfg.label}">
      <span class="stat-dot" style="background:${cfg.color}"></span>
      <div>
        <div class="stat-num" style="color:${cfg.color}">${counts[s] ?? 0}</div>
        <div class="stat-label">${cfg.label}</div>
      </div>
    </div>`).join('');

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item" onclick="setStage('all')" title="Show all">
      <span class="stat-dot" style="background:var(--t3)"></span>
      <div>
        <div class="stat-num" style="color:var(--t1)">${items.length}</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    ${stages}`;
}

// ─── Card Grid ───────────────────────────────────────────────────────────────

function renderGrid(items) {
  const grid = document.getElementById('grid');

  if (!items.length) {
    grid.innerHTML = `
      <div class="state-center">
        <h3>No matches</h3>
        <p>Try clearing a filter or broadening your search.</p>
      </div>`;
    return;
  }

  grid.innerHTML = items.map(buildCard).join('');

  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      const item = allItems.find(i => i.id === el.dataset.id);
      if (item) openDrawer(item);
    });
  });
}

function buildCard(item) {
  const s      = STAGE[item.stage] || {};
  const sc     = s.color || '#8B949E';
  const cc     = CREATOR_COLORS[item.creator] || '#8B949E';
  const init   = (item.creator || '?')[0].toUpperCase();
  const mono   = (item.name || '?')[0].toUpperCase();
  const hasLink = item.shareLink?.startsWith('http');
  const purpose = item.notes?.purpose;
  const audit   = item.notes?.productionAudit || [];

  // Audit chips (up to 2)
  const auditHtml = audit.slice(0, 2).map(a => {
    const cls = /prod/i.test(a) ? 'prod' : /need/i.test(a) ? 'need' : 'other';
    return `<span class="audit-chip ${cls}">${esc(shortenAudit(a))}</span>`;
  }).join('');

  // Meta chips
  const meta = [];
  if (item.notes?.audience) meta.push(`<span class="meta-chip">👥 ${esc(item.notes.audience)}</span>`);
  if (item.notes?.timeline) meta.push(`<span class="meta-chip">📅 ${esc(item.notes.timeline)}</span>`);

  // Stage pill
  const stagePill = `
    <span class="stage-pill" style="color:${sc};background:${sc}18;">
      <span class="stage-dot-sm" style="background:${sc}"></span>${s.label || item.stage}
    </span>`;

  return `
    <div class="card" data-id="${esc(item.id)}">
      <div class="card-accent" style="background:${sc}"></div>
      <div class="card-preview">
        <div class="preview-bg" style="background:linear-gradient(145deg,${sc}10,${sc}22)"></div>
        <div class="preview-pattern" style="color:${sc}"></div>
        <div class="preview-mono" style="color:${sc}">${mono}</div>
        ${hasLink ? '<span class="live-badge">Live</span>' : ''}
      </div>
      <div class="card-body">
        <div class="card-top">
          <h3 class="card-title">${esc(item.name)}</h3>
          <div class="avatar" style="background:${cc}" title="${esc(item.creator || 'Unknown')}">${init}</div>
        </div>
        ${purpose
          ? `<p class="card-purpose">${esc(purpose)}</p>`
          : `<p class="card-no-notes">No details added yet.</p>`}
        ${meta.length ? `<div class="meta-chips">${meta.join('')}</div>` : ''}
        ${auditHtml   ? `<div class="audit-chips">${auditHtml}</div>` : ''}
        <div class="card-footer">
          ${stagePill}
          ${hasLink ? `<a class="view-link" href="${esc(item.shareLink)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View live →</a>` : ''}
        </div>
      </div>
    </div>`;
}

function shortenAudit(text) {
  const t = text.toLowerCase();
  if (t.includes('already in prod')) return 'In Production ✓';
  if (t.includes('need auth'))       return 'Needs Auth';
  if (t.includes('need hosting'))    return 'Needs Hosting';
  if (t.includes('additional spec')) return 'Needs Specs';
  if (t.includes('not yet built'))   return 'Not Yet Built';
  return text.length > 28 ? text.slice(0, 27) + '…' : text;
}

// ─── Drawer Modal ─────────────────────────────────────────────────────────────

function openDrawer(item) {
  const s      = STAGE[item.stage] || {};
  const sc     = s.color || '#8B949E';
  const cc     = CREATOR_COLORS[item.creator] || '#8B949E';
  const init   = (item.creator || '?')[0].toUpperCase();
  const hasLink = item.shareLink?.startsWith('http');
  const n      = item.notes || {};
  const hasAny = n.purpose || n.audience || n.timeline || n.nextSteps?.length || n.productionAudit?.length;

  document.getElementById('drawerAccent').style.background = sc;
  document.getElementById('drawerTitle').textContent = item.name;

  // Meta row
  document.getElementById('drawerMeta').innerHTML = `
    <div class="drawer-creator">
      <div class="avatar" style="background:${cc};width:22px;height:22px;font-size:0.55rem">${init}</div>
      <span>${esc(item.creator || 'Unknown')}</span>
    </div>
    <span class="stage-pill" style="color:${sc};background:${sc}18;">
      <span class="stage-dot-sm" style="background:${sc}"></span>${s.label || item.stage}
    </span>`;

  // Body sections
  const sections = [];

  if (n.purpose) {
    sections.push(`<div class="dsec"><h4>Purpose</h4><p>${esc(n.purpose)}</p></div>`);
  }

  if (n.audience || n.timeline) {
    sections.push(`
      <div class="dsec">
        <h4>For Who &amp; When</h4>
        <div class="dl">
          ${n.audience ? `<div class="dl-row"><span class="dl-key">Audience</span><span class="dl-val">${esc(n.audience)}</span></div>` : ''}
          ${n.timeline ? `<div class="dl-row"><span class="dl-key">Timeline</span><span class="dl-val">${esc(n.timeline)}</span></div>` : ''}
        </div>
      </div>`);
  }

  if (n.nextSteps?.length) {
    sections.push(`
      <div class="dsec">
        <h4>Next Steps &amp; Features</h4>
        <ul class="steps-list">
          ${n.nextSteps.map(s => `<li>${esc(s)}</li>`).join('')}
        </ul>
      </div>`);
  }

  if (n.productionAudit?.length) {
    sections.push(`
      <div class="dsec">
        <h4>Production Readiness</h4>
        <div class="audit-rows">
          ${n.productionAudit.map(a => {
            const icon = /prod/i.test(a) ? '✅' : /need/i.test(a) ? '🔲' : '◦';
            return `<div class="audit-row"><span class="audit-row-icon">${icon}</span><span>${esc(a)}</span></div>`;
          }).join('')}
        </div>
      </div>`);
  }

  if (!hasAny) {
    sections.push(`<p class="no-notes">No details have been added yet. The creator can fill this in via the Asana task.</p>`);
  }

  document.getElementById('drawerBody').innerHTML = sections.join('');

  // Actions
  const acts = [];
  if (hasLink) acts.push(`<a href="${esc(item.shareLink)}" target="_blank" rel="noopener" class="btn-primary">View Live →</a>`);
  acts.push(`<button class="btn-secondary" onclick="closeDrawer()">Close</button>`);
  document.getElementById('drawerActions').innerHTML = acts.join('');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Close on overlay click or Escape
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeDrawer();
});
document.getElementById('closeBtn').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ─── Utils ───────────────────────────────────────────────────────────────────

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

// ─── Boot ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
